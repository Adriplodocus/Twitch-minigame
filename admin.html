<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Russo+One&family=Quicksand:wght@500;700&family=JetBrains+Mono:wght@600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
    <title>Admin</title>
  </head>
  <body>
    <header class="page-header">
      <div class="page-header-actions">
        <a class="btn btn-icon" href="/collection.html">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12" />
            <polyline points="12 19 5 12 12 5" />
          </svg>
          Volver a Colección
        </a>
      </div>
      <div class="page-header-user">
        <button class="icon-btn" id="logout-btn" type="button" title="Cerrar sesión" aria-label="Cerrar sesión">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
        </button>
      </div>
    </header>
    <div class="container" style="padding: 2rem 1rem;">
      <h1>Admin</h1>

      <div id="login-view" style="margin-top: 1.5rem; max-width: 320px;">
        <input class="input" id="login-name" type="text" placeholder="Nombre" style="width: 100%;" />
        <input class="input" id="login-password" type="password" placeholder="Clave" style="width: 100%; margin-top: 0.5rem;" />
        <button class="btn" id="login-btn" style="margin-top: 0.75rem;">Entrar</button>
        <p id="login-error" style="color: #C2477F; margin-top: 0.5rem; display: none;"></p>
      </div>

      <div id="panel-view" style="display: none; margin-top: 1.5rem;">
        <div>
          <input
            class="input"
            id="search-input"
            placeholder="Buscar username de Twitch"
            style="margin-top: 0.75rem; width: 100%; max-width: 320px;"
          />
          <div id="search-results" style="margin-top: 0.5rem;"></div>

          <div id="selected-user" style="display: none; margin-top: 0.75rem; align-items: center; gap: 0.5rem;">
            <span class="badge" id="selected-user-name"></span>
            <button class="btn" id="clear-selection-btn" style="padding: 0.3rem 0.8rem;">x</button>
          </div>

          <div style="margin-top: 0.75rem; display: flex; align-items: center; gap: 0.5rem;">
            <input class="input" id="quantity-input" type="number" min="1" max="50" value="1" style="width: 80px;" />
            <select class="input" id="tier-select">
              <option value="gratis">Gratis</option>
              <option value="apoyo">Apoyo</option>
            </select>
            <button class="btn" id="grant-btn" disabled>Dar blíster(s)</button>
          </div>
          <p id="grant-message" style="margin-top: 0.5rem;"></p>
        </div>

        <div style="margin-top: 2rem;">
          <h2>Sobre de prueba</h2>
          <p style="margin-top: 0.25rem;">Envía un sobre al overlay sin tocar ninguna colección real.</p>
          <div style="margin-top: 0.75rem; display: flex; align-items: center; gap: 0.5rem;">
            <select class="input" id="test-pack-generation"></select>
            <select class="input" id="test-pack-tier">
              <option value="gratis">Gratis</option>
              <option value="apoyo">Apoyo</option>
            </select>
            <button class="btn" id="test-pack-btn">Abrir sobre de prueba</button>
          </div>
          <p id="test-pack-message" style="margin-top: 0.5rem;"></p>
        </div>

        <div style="margin-top: 2rem;">
          <h2>Configuración de sobres automáticos</h2>
          <div style="margin-top: 0.75rem; display: flex; flex-direction: column; gap: 0.5rem; max-width: 320px;">
            <label>
              Sobres por canje de puntos
              <input class="input" id="cfg-reward-quantity" type="number" min="0" max="1000" style="width: 100%;" />
            </label>
            <label>
              Bits por sobre
              <input class="input" id="cfg-bits-threshold" type="number" min="1" max="1000" style="width: 100%;" />
            </label>
            <label>
              Sobres por umbral de bits
              <input class="input" id="cfg-bits-quantity" type="number" min="0" max="1000" style="width: 100%;" />
            </label>
            <label>
              Sobres por suscripción/renovación
              <input class="input" id="cfg-sub-quantity" type="number" min="0" max="1000" style="width: 100%;" />
            </label>
            <label>
              Sobres por sub regalada
              <input class="input" id="cfg-gift-sub-multiplier" type="number" min="0" max="1000" style="width: 100%;" />
            </label>
          </div>
          <button class="btn" id="cfg-save-btn" style="margin-top: 0.75rem;">Guardar configuración</button>
          <p id="cfg-message" style="margin-top: 0.5rem;"></p>
        </div>

        <div style="margin-top: 2rem;">
          <h2>Historial</h2>
          <table style="width: 100%; margin-top: 0.75rem; border-collapse: collapse;">
            <thead>
              <tr>
                <th style="text-align: left; padding: 0.4rem;">Usuario</th>
                <th style="text-align: left; padding: 0.4rem;">Tier</th>
                <th style="text-align: left; padding: 0.4rem;">Fuente</th>
                <th style="text-align: left; padding: 0.4rem;">Fecha</th>
              </tr>
            </thead>
            <tbody id="history-body"></tbody>
          </table>
        </div>
      </div>
    </div>
    <script type="module" src="/src/admin.ts"></script>
  </body>
</html>
