<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Russo+One&family=Quicksand:wght@500;700&family=JetBrains+Mono:wght@600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
    <title>Álbum</title>
  </head>
  <body>
    <header class="page-header">
      <div class="page-header-actions">
        <a class="btn btn-icon" href="/collection.html">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12" />
            <polyline points="12 19 5 12 12 5" />
          </svg>
          Volver a Colección
        </a>
        <span class="header-sep"></span>
        <button class="btn btn-icon" id="trade-link-btn" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="12" height="12" rx="2" />
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
          </svg>
          <span class="btn-label">Enlace para trade</span>
        </button>
        <a class="btn" href="/offers.html">Ver ofertas de trade</a>
      </div>
      <div class="page-header-user">
        <img id="user-avatar" class="user-avatar" alt="" />
        <span id="user-name" class="user-name"></span>
        <button class="icon-btn" id="logout-btn" type="button" title="Cerrar sesión" aria-label="Cerrar sesión">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
        </button>
      </div>
    </header>
    <div class="container container-album" style="padding: 2rem 1rem;">
      <h1>Álbum</h1>

      <div id="album-picker">
        <h2 id="picker-heading" class="section-heading"></h2>
        <div id="album-picker-grid" class="album-picker-grid"></div>
      </div>

      <div id="album-book" style="display: none;">
        <div class="book-header">
          <a href="/album.html" class="btn book-back-btn">← Álbumes</a>
          <h2 id="book-heading" class="section-heading"></h2>
        </div>
        <div class="book">
          <button type="button" class="book-nav book-nav-prev" id="book-prev" aria-label="Página anterior">‹</button>
          <div class="book-spread" id="book-spread"></div>
          <button type="button" class="book-nav book-nav-next" id="book-next" aria-label="Página siguiente">›</button>
        </div>
        <p class="book-indicator" id="book-indicator"></p>
      </div>
    </div>
    <audio id="page-flip-sound" src="/page-flip.mp3" preload="auto"></audio>
    <script type="module" src="/src/album.ts"></script>
  </body>
</html>
