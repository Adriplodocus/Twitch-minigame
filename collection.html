<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Russo+One&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
    <title>Mi Colección</title>
  </head>
  <body>
    <div class="container" style="padding: 2rem 1rem;">
      <h1>Mi Colección</h1>
      <div style="display: flex; gap: 0.75rem; margin-top: 1rem;">
        <a class="btn" href="/trade.html">Ir a Trading</a>
        <a class="btn" href="/album.html">Ver Álbum</a>
      </div>

      <div id="pending-packs" style="margin-top: 2rem;"></div>

      <h2 id="owned-heading" class="section-heading"></h2>
      <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.75rem;">
        <select id="sort-field" class="input">
          <option value="pokedex">Pokédex</option>
          <option value="recent">Recientes</option>
          <option value="quantity">Cantidad</option>
        </select>
        <select id="sort-direction" class="input">
          <option value="asc">Ascendente</option>
          <option value="desc">Descendente</option>
        </select>
      </div>
      <div id="owned-grid" class="card-grid"></div>

      <h2 id="unowned-heading" class="section-heading"></h2>
      <div id="unowned-grid" class="card-grid"></div>
    </div>
    <script type="module" src="/src/collection.ts"></script>
  </body>
</html>
