<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Russo+One&family=Quicksand:wght@500;700&family=JetBrains+Mono:wght@600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
    <title>Ofertas</title>
  </head>
  <body>
    <header class="page-header">
      <div class="page-header-actions">
        <a class="btn btn-icon" href="/collection.html">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12" />
            <polyline points="12 19 5 12 12 5" />
          </svg>
          Volver a Colección
        </a>
      </div>
      <div class="page-header-user">
        <div class="info-popover-wrap">
          <button class="how-to-btn" id="how-to-btn" type="button" aria-haspopup="true" aria-expanded="false">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10" />
              <line x1="12" y1="16" x2="12" y2="12" />
              <line x1="12" y1="8" x2="12.01" y2="8" />
            </svg>
            ¿Cómo conseguir sobres?
          </button>
          <div class="info-popover" id="how-to-panel" hidden>
            <ul>
              <li><strong>Canjea la recompensa del canal</strong><span>Sobre normal</span></li>
              <li><strong>Suscríbete</strong><span>Sobre especial</span></li>
              <li><strong>Regala suscripciones</strong><span>x1 sobre por cada sub · Sobre especial</span></li>
              <li><strong>Dona bits</strong><span>x1 sobre por cada 200 bits · Sobre especial</span></li>
              <li><strong>Donación en PayPal</strong><span>x1 sobre por cada 2€ · Sobre especial</span></li>
            </ul>
          </div>
        </div>
        <a
          class="donate-btn"
          href="https://www.paypal.com/paypalme/MrKlypp"
          target="_blank"
          rel="noopener"
          title="Incluye tu usuario de Twitch en la nota del pago para recibir tu sobre automáticamente"
        >
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 21s-6.5-4.35-9.3-8.28C.86 10.36 1.2 7 4 5.5c2.1-1.13 4.5-.5 5.7 1.2L12 9.3l2.3-2.6c1.2-1.7 3.6-2.33 5.7-1.2 2.8 1.5 3.14 4.86 1.3 7.22C18.5 16.65 12 21 12 21z" />
          </svg>
          Donar
        </a>
        <img id="user-avatar" class="user-avatar" alt="" />
        <span id="user-name" class="user-name"></span>
        <button class="icon-btn" id="logout-btn" type="button" title="Cerrar sesión" aria-label="Cerrar sesión">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
        </button>
      </div>
    </header>
    <div class="container" style="padding: 2rem 1rem;">
      <h1>Ofertas</h1>

      <div id="offers-list" class="offers-columns"></div>
    </div>
    <script type="module" src="/src/offers.ts"></script>
  </body>
</html>
